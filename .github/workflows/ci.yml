name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Lint, test & build (Next.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      # Build needs no secrets: the Supabase clients resolve to empty config and
      # the data-fetching routes are dynamic (evaluated at request time, not build).
      - name: Build
        run: npm run build

  scraper:
    name: Scraper unit tests (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # test_pipeline.py only exercises pure helpers (stdlib only), so the heavy
      # scraper deps (httpx, playwright) are intentionally not installed here.
      - name: Run pipeline tests
        working-directory: scraper
        run: python test_pipeline.py
