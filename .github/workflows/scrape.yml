name: Weekly Green Grant Scraper

on:
  schedule:
    - cron: "0 0 * * 0" # Runs every Sunday at midnight UTC
  workflow_dispatch: # Allows manual execution from the GitHub UI

jobs:
  scrape-and-update:
    name: Run Scraper Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip" # Replaces the separate cache step cleanly

      - name: Install Dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright Browsers
        run: playwright install --with-deps chromium

      - name: Execute Scraper Engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scraper/scraper.py
